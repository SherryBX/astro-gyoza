backend:
  name: github
  repo: SherryBX/astro-gyoza
  branch: main
  base_url: https://decap-oauth.sherry-account.workers.dev
  auth_endpoint: /auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "zh_Hans"

collections:
  - name: "posts"
    label: "博客文章"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "评论", name: "comments", widget: "boolean", default: true}
      - {label: "草稿", name: "draft", widget: "boolean", default: false}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "projects"
    label: "项目"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "描述", name: "description", widget: "text"}
      - {label: "链接", name: "link", widget: "string", required: false}
      - {label: "图片", name: "image", widget: "image", required: false}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "friends"
    label: "友链"
    folder: "src/content/friends"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "名称", name: "name", widget: "string"}
      - {label: "链接", name: "link", widget: "string"}
      - {label: "头像", name: "avatar", widget: "string"}
      - {label: "描述", name: "description", widget: "text", required: false}

  - name: "spec"
    label: "页面"
    folder: "src/content/spec"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "内容", name: "body", widget: "markdown"}

  - name: "config"
    label: "网站配置"
    files:
      - label: "全局配置"
        name: "site_config"
        file: "src/config.json"
        fields:
          - label: "站点信息"
            name: "site"
            widget: "object"
            fields:
              - {label: "网站地址", name: "url", widget: "string"}
              - {label: "网站标题", name: "title", widget: "string"}
              - {label: "网站描述", name: "description", widget: "text"}
              - {label: "关键词", name: "keywords", widget: "string"}
              - {label: "语言", name: "lang", widget: "string", default: "zh-CN"}
              - {label: "Favicon", name: "favicon", widget: "string", default: "/favicon.ico"}
              - {label: "Apple Touch Icon", name: "appleTouchIcon", widget: "string", default: "/apple-touch-icon.png"}

          - label: "作者信息"
            name: "author"
            widget: "object"
            fields:
              - {label: "名称", name: "name", widget: "string"}
              - {label: "Twitter ID", name: "twitterId", widget: "string"}
              - {label: "头像", name: "avatar", widget: "string"}

          - label: "首页配置"
            name: "hero"
            widget: "object"
            fields:
              - {label: "名称", name: "name", widget: "string"}
              - {label: "简介", name: "bio", widget: "text"}
              - {label: "描述", name: "description", widget: "string"}
              - {label: "一言", name: "yiyan", widget: "text"}
              - label: "社交链接"
                name: "socials"
                widget: "list"
                fields:
                  - {label: "名称", name: "name", widget: "string"}
                  - {label: "图标", name: "icon", widget: "string"}
                  - {label: "链接", name: "url", widget: "string"}
                  - {label: "颜色", name: "color", widget: "string"}

          - label: "菜单"
            name: "menus"
            widget: "list"
            fields:
              - {label: "名称", name: "name", widget: "string"}
              - {label: "链接", name: "link", widget: "string"}
              - {label: "图标", name: "icon", widget: "string"}

          - label: "文章配置"
            name: "posts"
            widget: "object"
            fields:
              - {label: "每页文章数", name: "perPage", widget: "number", default: 10}

          - label: "页脚配置"
            name: "footer"
            widget: "object"
            fields:
              - {label: "开始时间", name: "startTime", widget: "datetime"}

          - label: "Waline 评论"
            name: "waline"
            widget: "object"
            fields:
              - {label: "服务器地址", name: "serverURL", widget: "string", required: false}
